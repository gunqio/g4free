name: Game4Free-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 🔍 确认脚本文件存在
        run: |
          if [ -f private/gaming4free.py ]; then
            echo "✅ 找到 gaming4free.py"
            ls -la private/
          else
            echo "❌ 私库中未找到 gaming4free.py"
            find private/ -name "*.py" | head -20
            exit 1
          fi

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装 sing-box
        run: |
          bash -c "$(curl -fsSL https://sing-box.app/install.sh)"
          sing-box version

      - name: 🛠️ 安装 Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: 🐍 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install seleniumbase==4.33.12

      - name: 🔧 安装 ChromeDriver
        run: seleniumbase install chromedriver

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: 1
          TG_BOT: ${{ secrets.TG_BOT }}
          GAME4FREE_ACCOUNT: ${{ secrets.GAME4FREE_ACCOUNT }}
          GAME4FREE_PROXY: ${{ secrets.GAME4FREE_PROXY }}
        run: python private/gaming4free.py

      - name: 📸 上传截图和日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            *.png
            *.log
