name: Game Container Auto Renewal

on:
 
  workflow_dispatch:
  repository_dispatch:
    types: [external-trigger]

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 检出主仓库（用于存放工作流）
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # 2. 设置 Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装系统依赖
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev udev unzip netcat-openbsd git

      # 4. 安装 Node 依赖
      - name: Install Node Dependencies
        run: |
          npm init -y
          npm install puppeteer-real-browser axios

      # 5. 从私库拉取 renew.js 和 cookies.json
      - name: 📥 从私库拉取脚本和 Cookie
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          # 克隆私库到 private 目录
          git clone https://${PRIVATE_REPO_TOKEN}@github.com/gunqio/zhiyong.git private

          # 检查文件是否存在
          if [ -f private/renew.js ]; then
            echo "✅ renew.js 下载成功"
            cp private/renew.js ./renew.js
          else
            echo "❌ private/renew.js 不存在"
            exit 1
          fi

          if [ -f private/cookies.json ]; then
            echo "✅ cookies.json 下载成功"
            cp private/cookies.json ./cookies.json
          else
            echo "⚠️ private/cookies.json 不存在，将创建新文件"
            echo '[]' > ./cookies.json
          fi

      # 6. 解析代理链接（支持 VLESS 和 VMess）生成 Xray 配置
      - name: Parse Proxy Link and Generate Xray Config
        env:
          PROXY_LINK: ${{ secrets.PROXY_LINK }}
        run: |
          node -e "
          const fs = require('fs');
          const { URL } = require('url');

          const proxyLink = process.env.PROXY_LINK;
          if (!proxyLink) {
              console.error('Error: PROXY_LINK secret is missing!');
              process.exit(1);
          }

          let config;
          const socksInbound = {
              'listen': '127.0.0.1',
              'port': 10808,
              'protocol': 'socks',
              'settings': { 'udp': true, 'auth': 'noauth' }
          };

          if (proxyLink.startsWith('vless://')) {
              // === VLESS 解析 ===
              const urlObj = new URL(proxyLink);
              const uuid = urlObj.username;
              const address = urlObj.hostname;
              const port = parseInt(urlObj.port);
              const searchParams = urlObj.searchParams;
              const type = searchParams.get('type') || 'tcp';
              const security = searchParams.get('security') || 'none';
              const path = searchParams.get('path') || '/';
              const sni = searchParams.get('sni') || searchParams.get('host') || address;
              const host = searchParams.get('host') || address;

              config = {
                  'log': { 'loglevel': 'warning' },
                  'inbounds': [socksInbound],
                  'outbounds': [{
                      'protocol': 'vless',
                      'settings': {
                          'vnext': [{
                              'address': address,
                              'port': port,
                              'users': [{ 'id': uuid, 'encryption': 'none' }]
                          }]
                      },
                      'streamSettings': {
                          'network': type,
                          'security': security,
                          'tlsSettings': security === 'tls' ? {
                              'serverName': sni,
                              'allowInsecure': false
                          } : undefined,
                          'wsSettings': type === 'ws' ? {
                              'path': path,
                              'headers': { 'Host': host }
                          } : undefined
                      }
                  }]
              };

          } else if (proxyLink.startsWith('vmess://')) {
              // === VMess 解析 ===
              const base64Data = proxyLink.replace('vmess://', '');
              const decoded = Buffer.from(base64Data, 'base64').toString('utf-8');
              const vmess = JSON.parse(decoded);

              const address = vmess.add;
              const port = parseInt(vmess.port);
              const uuid = vmess.id;
              const type = vmess.net || 'tcp';
              const security = vmess.tls === 'tls' ? 'tls' : 'none';
              const path = vmess.path || '/';
              const sni = vmess.sni || vmess.host || address;
              const host = vmess.host || address;

              config = {
                  'log': { 'loglevel': 'warning' },
                  'inbounds': [socksInbound],
                  'outbounds': [{
                      'protocol': 'vmess',
                      'settings': {
                          'vnext': [{
                              'address': address,
                              'port': port,
                              'users': [{
                                  'id': uuid,
                                  'alterId': parseInt(vmess.aid || '0'),
                                  'security': vmess.scy || 'auto'
                              }]
                          }]
                      },
                      'streamSettings': {
                          'network': type,
                          'security': security,
                          'tlsSettings': security === 'tls' ? {
                              'serverName': sni,
                              'allowInsecure': vmess.insecure === '1'
                          } : undefined,
                          'wsSettings': type === 'ws' ? {
                              'path': path,
                              'headers': { 'Host': host }
                          } : undefined
                      }
                  }]
              };

          } else {
              console.error('Unsupported proxy link format. Only vless:// and vmess:// are supported.');
              process.exit(1);
          }

          fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          console.log('✅ Successfully generated config.json for Xray-core!');
          console.log('Protocol:', config.outbounds[0].protocol);
          console.log('Server:', config.outbounds[0].settings.vnext[0].address);
          console.log('Port:', config.outbounds[0].settings.vnext[0].port);
          "

      # 7. 下载并运行 Xray-core
      - name: Download and Run Xray-core
        run: |
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -o xray.zip -d xray-bin
          chmod +x xray-bin/xray
          ./xray-bin/xray run -c config.json > xray.log 2>&1 &
          sleep 5
          nc -z -v 127.0.0.1 10808 || { echo 'Local SOCKS5 proxy port is not active!'; exit 1; }

      # 8. 运行续期脚本
      - name: Run Renewal Script via Xvfb
        env:
          CONSOLE_URL: ${{ secrets.CONSOLE_URL }}
          COOKIE_XSRF: ${{ secrets.COOKIE_XSRF }}
          COOKIE_SESSION: ${{ secrets.COOKIE_SESSION }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY: socks5://127.0.0.1:10808
        run: |
          xvfb-run --server-args="-screen 0 1280x1200x24" node renew.js

      # 9. 将更新后的 cookies.json 推回私库
      - name: 📤 推送更新后的 cookies.json 到私库
        if: always()
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          cd private
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 复制更新后的 cookies.json
          if [ -f ../cookies.json ]; then
            cp ../cookies.json ./cookies.json
            git add cookies.json
            git diff-index --quiet HEAD || git commit -m "chore: auto-update session cookies [skip ci]"
            git push origin HEAD:main || git push origin HEAD:master
            echo "✅ cookies.json 已推回私库"
          else
            echo "⚠️ 未生成新的 cookies.json，跳过推送"
          fi

      # 10. 上传调试截图
      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
